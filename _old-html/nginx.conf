server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- gzip ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ---------- security headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---------- pretty URLs: /over-ons -> over-ons.html ----------
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ---------- caching: hashed/static assets ----------
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
        access_log off;
        try_files $uri =404;
    }

    # ---------- HTML: revalidate often ----------
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # ---------- robots / sitemap (optional, future-proof) ----------
    location = /robots.txt {
        log_not_found off;
        access_log off;
        try_files $uri =404;
    }

    # ---------- custom error pages ----------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    # ---------- disable favicon logs ----------
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        try_files $uri =204;
    }
}